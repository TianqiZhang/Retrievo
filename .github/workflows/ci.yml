name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json
            nuget.config

      - name: Restore
        run: dotnet restore src/Retrievo.Cli/Retrievo.Cli.csproj

      - name: Build
        run: dotnet build src/Retrievo.Cli/Retrievo.Cli.csproj --configuration Release --no-restore

      - name: Test unit suite
        run: dotnet test tests/Retrievo.Tests/Retrievo.Tests.csproj --configuration Release

      - name: Test integration suite
        run: dotnet test tests/Retrievo.IntegrationTests/Retrievo.IntegrationTests.csproj --configuration Release
